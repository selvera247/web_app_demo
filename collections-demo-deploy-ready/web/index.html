<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Collections Intelligence</title>

  <style>
    :root{
      --bg:#0b0f14;
      --panel:#0f1621;
      --panel2:#101b28;
      --text:#e8eef7;
      --muted:#9aa8ba;
      --line:#1e2a3a;
      --accent:#7aa2ff;
      --good:#35d07f;
      --warn:#ffcc66;
      --bad:#ff6b6b;
      --shadow: 0 12px 30px rgba(0,0,0,.45);
      --radius:14px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      --sans: ui-sans-serif, system-ui;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:var(--sans);
      background:radial-gradient(1200px 800px at 30% -10%, rgba(122,162,255,.22), transparent 55%), var(--bg);
      color:var(--text);
    }

    header{
      padding:20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .title{display:flex; gap:12px; align-items:center;}
    .logo{
      width:38px;height:38px;border-radius:12px;
      background:linear-gradient(135deg, rgba(122,162,255,.35), rgba(53,208,127,.22));
      display:grid;place-items:center;
    }

    .btn{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color:white;
      padding:8px 12px;
      border-radius:10px;
      cursor:pointer;
    }

    .grid{
      display:grid;
      grid-template-columns: 280px 1fr 400px;
      gap:14px;
      padding:20px;
    }

    .panel{
      background:var(--panel);
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      overflow:hidden;
    }

    .ph{
      padding:12px;
      border-bottom:1px solid rgba(255,255,255,.06);
      font-weight:700;
    }

    .pb{padding:12px;}

    .card{
      background:rgba(8,12,18,.72);
      border:1px solid rgba(255,255,255,.06);
      border-radius:12px;
      padding:10px;
    }

    table{width:100%; border-collapse:collapse;}
    td,th{padding:10px; font-size:12px;}
    th{color:var(--muted); text-align:left;}
    tr:hover{background:rgba(122,162,255,.08); cursor:pointer;}

    .mono{font-family:var(--mono)}

    /* =========================
       MODAL FIX
       ========================= */

    .modal-backdrop{
      position:fixed;
      inset:0;
      background:rgba(3,8,14,.78);
      display:none;
      align-items:center;
      justify-content:center;
      backdrop-filter: blur(10px);
      z-index:999;
    }

    .modal-backdrop.show{display:flex;}

    .modal{
      width:min(900px,100%);
      background:#0f1621;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 24px 70px rgba(0,0,0,.65);
      overflow:hidden;
    }

    .mh{
      padding:12px;
      background:#101b28;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid rgba(255,255,255,.07);
    }

    .mb{
      padding:14px;
      background:#0f1621;
    }

    .mb .card{
      background:rgba(255,255,255,.03);
    }

    .section-title{
      margin:10px 0;
      font-weight:700;
    }

    ul{margin-left:18px;}
  </style>
</head>

<body>

<header>
  <div class="title">
    <div class="logo">💰</div>
    <div>
      <div style="font-weight:800">Collections Intelligence</div>
      <div style="font-size:12px;color:var(--muted)">Agentic AR Copilot</div>
    </div>
  </div>

  <button class="btn" id="btnWhy">Why (AI)</button>
</header>

<div class="grid">

  <div class="panel">
    <div class="ph">Filters</div>
    <div class="pb">
      <div class="card">Controls here</div>
    </div>
  </div>

  <div class="panel">
    <div class="ph">Priority Queue</div>
    <div class="pb">
      <table>
        <thead>
          <tr>
            <th>Customer</th>
            <th>Invoice</th>
            <th>Open</th>
            <th>DPD</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Company_28</td>
            <td class="mono">INV-108357</td>
            <td>$260,129</td>
            <td>128</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="panel">
    <div class="ph">Detail</div>
    <div class="pb">
      <div class="card">Select row</div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div id="modalBackdrop" class="modal-backdrop">
  <div class="modal">
    <div class="mh">
      <div>Why (AI)</div>
      <button class="btn" onclick="closeModal()">Close</button>
    </div>
    <div class="mb" id="modalBody">
      <div class="card">
        <div class="section-title">Summary</div>
        <div>Clean readable explanation here.</div>
      </div>
    </div>
  </div>
</div>

<script>
function openModal(){
  document.getElementById("modalBackdrop").classList.add("show");
}

function closeModal(){
  document.getElementById("modalBackdrop").classList.remove("show");
}

document.getElementById("btnWhy").onclick = openModal;
</script>

</body>
</html>
