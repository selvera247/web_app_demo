services:
  - type: web
    name: collections-demo-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DEMO_MODE
        value: "true"
      - key: OLLAMA_ENABLED
        value: "false"
